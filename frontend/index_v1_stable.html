<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valet Eye — Sistema de Gestión</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface2: #1e1e1e;
            --accent: #3b82f6;
            --accent2: #ef4444;
            --success: #10b981;
            --text: #ffffff;
            --muted: #a1a1aa;
            --border: rgba(255,255,255,0.1);
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow: hidden;
            height: 100vh;
        }

        /* --- LAYOUT --- */
        #app { display: flex; flex-direction: column; height: 100vh; }

        header {
            background: var(--surface);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.4rem; color: var(--accent); letter-spacing: -0.5px; }
        .logo span { color: #fff; }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 80px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 10px 0;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5px;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.2s;
            font-size: 0.7rem;
            text-align: center;
            gap: 5px;
        }

        .nav-item i { font-size: 1.4rem; font-style: normal; }
        .nav-item.active { color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        .nav-item:hover { color: #fff; }

        /* --- CONTENT --- */
        main {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            position: relative;
        }

        .view-header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .view-title { font-size: 1.8rem; font-weight: 800; margin: 0; }

        /* --- DAMAGE MAP --- */
        .damage-canvas { width: 100%; max-width: 200px; margin: 0 auto; background: var(--surface2); border-radius: 12px; padding: 10px; border: 1px solid var(--border); position: relative; }
        .damage-marks circle { cursor: pointer; }

        /* --- PHOTO SLOTS --- */
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .photo-slot { background: var(--surface2); border: 2px dashed var(--border); border-radius: 12px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .photo-slot.filled { border-style: solid; border-color: var(--success); }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        .photo-label { font-size: 0.6rem; color: var(--muted); margin-top: 4px; }

        /* --- CARDS & GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .stat-card {
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .stat-label { font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
        .stat-value { font-size: 2rem; font-weight: 800; margin-top: 5px; }

        .vehicle-card {
            background: var(--surface2);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .vehicle-card:active { transform: scale(0.98); }
        .plate-tag {
            background: #fff;
            color: #000;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-weight: 800;
            display: inline-block;
        }

        /* --- BUTTONS --- */
        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font-main);
        }
        .btn-sm { padding: 8px 14px; font-size: 0.85rem; }
        .btn-secondary { background: var(--surface2); border: 1px solid var(--border); }
        .btn-danger { background: var(--accent2); }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-content {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border);
            max-height: 90vh;
            overflow-y: auto;
        }

        /* --- FORMS --- */
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.9rem; }
        input, select, textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            font-family: var(--font-main);
        }

        /* --- TOAST --- */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 2000; }
        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px 24px;
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 70px; border-right: none; border-top: 1px solid var(--border); flex-direction: row; justify-content: space-around; position: fixed; bottom: 0; padding: 0; }
            .nav-item { padding: 10px 0; font-size: 0.6rem; }
            main { padding: 15px; padding-bottom: 100px; }
            .view-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo">Valet<span>Eye</span></div>
        <div style="display:flex; gap:10px; align-items:center;">
            <div id="staff-info" style="font-size:0.85rem; color:var(--muted)">Director Valet</div>
            <button class="btn btn-sm btn-secondary" onclick="logout()">Salir</button>
        </div>
    </header>

    <div class="main-container">
        <nav class="sidebar">
            <div class="nav-item active" onclick="showTab('dashboard')" id="nav-dashboard"><i>📊</i><span>Panel</span></div>
            <div class="nav-item" onclick="showTab('checkin')" id="nav-checkin"><i>🚗</i><span>Entrada</span></div>
            <div class="nav-item" onclick="showTab('checkout')" id="nav-checkout"><i>📤</i><span>Salida</span></div>
            <div class="nav-item" onclick="showTab('vehicles')" id="nav-vehicles"><i>🏎️</i><span>Autos</span></div>
            <div class="nav-item" onclick="showTab('reports')" id="nav-reports"><i>📈</i><span>Reportes</span></div>
            <div class="nav-item" onclick="showTab('history')" id="nav-history"><i>📜</i><span>Historial</span></div>
            <div class="nav-item" onclick="showTab('settings')" id="nav-settings"><i>⚙️</i><span>Ajustes</span></div>
        </nav>

        <main id="main-content">
            <div style="text-align:center; padding-top:100px; color:var(--muted)">Inicializando sistema...</div>
        </main>
    </div>
</div>

<!-- MODALS -->
<div id="modal-container" class="modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal-content" id="modal-body"></div>
</div>

<div id="toast-container"></div>

<script>
    // --- CONFIG & STATE ---
    const API_BASE = window.location.origin;
    let currentTab = 'dashboard';
    let currentStaff = { id: 1, name: 'Director Valet', role: 'director' };
    let vehicles = [];
    let settings = { currency: '$', company_name: 'Smart Valet' };

    // --- INITIALIZATION ---
    window.onload = async () => {
        // Bypass login for testing
        if (!localStorage.getItem('token')) localStorage.setItem('token', 'master-bypass-token');
        await loadSettings();
        showTab('dashboard');
    };

    // --- NAVIGATION ---
    function showTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-' + tab).classList.add('active');

        const main = document.getElementById('main-content');
        main.innerHTML = `<div style="padding:40px; text-align:center; color:var(--muted)">Cargando ${tab}...</div>`;

        switch(tab) {
            case 'dashboard': renderDashboard(main); break;
            case 'checkin': renderCheckin(main); break;
            case 'checkout': renderCheckout(main); break;
            case 'vehicles': renderVehicles(main); break;
            case 'reports': renderReports(main); break;
            case 'history': renderHistory(main); break;
            case 'settings': renderSettings(main); break;
        }
    }

    // --- ANALYTICS ---
    async function renderReports(el) {
        el.innerHTML = `
            <div class="view-header"><h1 class="view-title">📈 Reportes y Analítica</h1></div>
            <div class="grid">
                <div class="stat-card">
                    <div class="stat-label">Ingresos Mensuales</div>
                    <div style="height:200px"><canvas id="chart-income"></canvas></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Carga de Trabajo</div>
                    <div style="height:200px"><canvas id="chart-load"></canvas></div>
                </div>
            </div>
        `;
        initCharts();
    }

    async function initCharts() {
        const data = await apiFetch('/api/reports/financial');
        if (!data) return;
        
        new Chart(document.getElementById('chart-income'), {
            type: 'line',
            data: {
                labels: data.daily.map(d => d.date).reverse(),
                datasets: [{ label: 'Ingresos', data: data.daily.map(d => d.total).reverse(), borderColor: '#3b82f6', tension: 0.4 }]
            }
        });
    }

    // --- VIEWS ---
    async function renderDashboard(el) {
        el.innerHTML = `
            <div class="view-header"><h1 class="view-title">📊 Panel Principal</h1></div>
            <div class="grid" id="dash-stats">
                <div class="stat-card"><div class="stat-label">En Parking</div><div class="stat-value" id="val-parked">0</div></div>
                <div class="stat-card"><div class="stat-label">Entradas Hoy</div><div class="stat-value" id="val-checkins">0</div></div>
                <div class="stat-card"><div class="stat-label">Ingresos</div><div class="stat-value" id="val-earnings">$0</div></div>
            </div>
            <div class="view-header" style="margin-top:40px"><h2 class="view-title">🚗 Recientes</h2></div>
            <div class="grid" id="dash-recent"></div>
        `;
        loadDashboardData();
    }

    function renderCheckin(el) {
        currentDamageMarks = [];
        photoData = {};
        el.innerHTML = `
            <div class="view-header"><h1 class="view-title">🚗 Registrar Entrada</h1></div>
            <div class="grid" style="grid-template-columns: 1fr 300px;">
                <div class="stat-card">
                    <div class="field"><label>Placa del Vehículo</label><input type="text" id="in-plate" placeholder="ABC-123" style="text-transform:uppercase; font-size:1.5rem; text-align:center"></div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <div class="field"><label>Dueño</label><input type="text" id="in-owner"></div>
                        <div class="field"><label>Teléfono</label><input type="text" id="in-phone" placeholder="+58 / +1"></div>
                    </div>
                    <div class="field"><label>Marca / Modelo / Color</label><input type="text" id="in-brand" placeholder="Ej: Toyota Corolla Blanco"></div>
                    
                    <div class="detail-section-title" style="margin-top:20px">Evidencia Fotográfica</div>
                    <div class="photo-grid">
                        <div class="photo-slot" onclick="triggerPhoto(0)" id="slot-0"><i>📷</i><span class="photo-label">FRONTAL</span></div>
                        <div class="photo-slot" onclick="triggerPhoto(1)" id="slot-1"><i>📷</i><span class="photo-label">TRASERA</span></div>
                        <div class="photo-slot" onclick="triggerPhoto(2)" id="slot-2"><i>📷</i><span class="photo-label">PILOTO</span></div>
                        <div class="photo-slot" onclick="triggerPhoto(3)" id="slot-3"><i>📷</i><span class="photo-label">COPILOTO</span></div>
                    </div>
                    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
                    
                    <button class="btn" style="width:100%; margin-top:30px; height:60px; font-size:1.2rem" onclick="processCheckin()">GENERAR TICKET</button>
                </div>
                
                <div class="stat-card" style="text-align:center">
                    <div class="detail-section-title">Mapa de Daños</div>
                    <div class="damage-canvas" onclick="markDamage(event)">
                        <svg viewBox="0 0 200 400" id="damage-svg">
                            <path d="M50,40 Q50,20 100,20 Q150,20 150,40 L150,360 Q150,380 100,380 Q50,380 50,360 Z" fill="none" stroke="var(--muted)" stroke-width="2"/>
                            <g id="damage-marks"></g>
                        </svg>
                    </div>
                    <button class="btn btn-sm btn-secondary" style="margin-top:15px" onclick="clearDamage()">Limpiar Marcas</button>
                    <p style="font-size:0.7rem; color:var(--muted); margin-top:10px">Toca el diagrama para marcar daños preexistentes</p>
                    <textarea id="in-notes" placeholder="Notas adicionales..." style="margin-top:15px; height:80px"></textarea>
                </div>
            </div>
        `;
    }

    let currentDamageMarks = [];
    let photoData = {};
    let activePhotoSlot = null;

    function markDamage(e) {
        const svg = document.getElementById('damage-svg');
        const rect = svg.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 200;
        const y = ((e.clientY - rect.top) / rect.height) * 400;
        currentDamageMarks.push({x, y});
        renderDamageMarks();
    }

    function renderDamageMarks() {
        const g = document.getElementById('damage-marks');
        g.innerHTML = currentDamageMarks.map(m => `<circle cx="${m.x}" cy="${m.y}" r="8" fill="var(--accent2)" stroke="white" stroke-width="2"/>`).join('');
    }

    function clearDamage() { currentDamageMarks = []; renderDamageMarks(); }

    function triggerPhoto(idx) {
        activePhotoSlot = idx;
        document.getElementById('photo-input').click();
    }

    function handlePhoto(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = e => {
            photoData[activePhotoSlot] = e.target.result;
            const slot = document.getElementById('slot-' + activePhotoSlot);
            slot.classList.add('filled');
            slot.innerHTML = `<img src="${e.target.result}">`;
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function renderCheckout(el) {
        el.innerHTML = `
            <div class="view-header"><h1 class="view-title">📤 Salida de Vehículo</h1></div>
            <div class="stat-card" style="max-width:500px">
                <div class="field"><label>Buscar por Placa o Ticket</label>
                    <input type="text" id="out-search" placeholder="ABC-123..." oninput="searchCheckout(this.value)" style="text-transform:uppercase; font-size:1.2rem">
                </div>
                <div id="out-results" style="margin-top:20px; display:flex; flex-direction:column; gap:10px"></div>
            </div>
        `;
    }

    async function searchCheckout(q) {
        if (q.length < 2) return document.getElementById('out-results').innerHTML = '';
        const data = await apiFetch('/api/vehicles/search?q=' + encodeURIComponent(q));
        const results = document.getElementById('out-results');
        results.innerHTML = data?.map(v => `
            <div class="vehicle-card" onclick="showDetail(${v.id})">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div class="plate-tag">${v.plate}</div>
                    <span style="font-size:0.8rem; color:var(--muted)">${v.owner_name || ''}</span>
                </div>
            </div>
        `).join('') || '<p>No se encontraron resultados</p>';
    }

    async function showDetail(id) {
        const v = await apiFetch('/api/vehicles/' + id);
        if (!v) return;
        
        const marks = v.damage_json ? JSON.parse(v.damage_json) : [];
        const modalBody = document.getElementById('modal-body');
        modalBody.innerHTML = `
            <h2 style="margin-top:0">${v.plate}</h2>
            <div class="grid" style="grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px">
                <div><label>Dueño</label><div>${v.owner_name || '—'}</div></div>
                <div><label>Estado</label><div>${v.status}</div></div>
            </div>
            
            <div class="detail-section-title">Mapa de Daños</div>
            <div class="damage-canvas" style="margin-bottom:20px">
                <svg viewBox="0 0 200 400">
                    <path d="M50,40 Q50,20 100,20 Q150,20 150,40 L150,360 Q150,380 100,380 Q50,380 50,360 Z" fill="none" stroke="var(--muted)" stroke-width="2"/>
                    ${marks.map(m => `<circle cx="${m.x}" cy="${m.y}" r="8" fill="var(--accent2)" stroke="white" stroke-width="2"/>`).join('')}
                </svg>
            </div>
            
            <div class="detail-section-title">Fotos de Evidencia</div>
            <div id="detail-photos" class="photo-grid" style="margin-bottom:20px">Cargando fotos...</div>
            
            <div style="display:flex; gap:10px">
                <button class="btn" style="flex:1" onclick="doCheckout(${v.id})">Entregar Auto</button>
                <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cerrar</button>
            </div>
        `;
        openModal();
        loadDetailPhotos(v.id);
    }

    async function loadDetailPhotos(id) {
        const data = await apiFetch(`/api/vehicles/${id}/photos`);
        const el = document.getElementById('detail-photos');
        if (data?.photos?.length) {
            el.innerHTML = data.photos.map(p => `<div class="photo-slot filled"><img src="${API_BASE}/api/photos/${p.url}"></div>`).join('');
        } else {
            el.innerHTML = '<p style="grid-column:1/-1; color:var(--muted); text-align:center">No hay fotos</p>';
        }
    }

    async function doCheckout(id) {
        if (!confirm('¿Confirmar entrega del vehículo?')) return;
        const res = await apiFetch('/api/events/checkout', {
            method: 'POST',
            body: JSON.stringify({ vehicle_id: id })
        });
        if (res) {
            toast('✅ Vehículo entregado', 'success');
            closeModal();
            showTab('dashboard');
        }
    }

    async function renderSettings(el) {
        el.innerHTML = `
            <div class="view-header"><h1 class="view-title">⚙️ Ajustes</h1><button class="btn" onclick="saveSettings()">Guardar</button></div>
            <div class="grid">
                <div class="stat-card">
                    <div class="field"><label>Nombre de Empresa</label><input type="text" id="set-name" value="${settings.company_name}"></div>
                    <div class="field"><label>Moneda</label><input type="text" id="set-currency" value="${settings.currency}"></div>
                </div>
            </div>
        `;
    }

    function renderHistory(el) {
        el.innerHTML = `<div class="view-header"><h1 class="view-title">📜 Historial</h1></div><div id="hist-grid" class="grid"></div>`;
        loadHistory();
    }

    async function loadHistory() {
        const data = await apiFetch('/api/vehicles');
        document.getElementById('hist-grid').innerHTML = data?.map(v => `
            <div class="vehicle-card">
                <div class="plate-tag">${v.plate}</div>
                <div style="font-size:0.8rem; margin-top:5px">${v.status === 'retrieved' ? '⚪ Entregado' : '🟢 Activo'}</div>
            </div>
        `).join('') || '';
    }

    async function renderVehicles(el) {
        el.innerHTML = `<div class="view-header"><h1 class="view-title">🏎️ Vehículos en Parking</h1></div><div class="grid" id="veh-grid"></div>`;
        const data = await apiFetch('/api/vehicles/active');
        const grid = document.getElementById('veh-grid');
        grid.innerHTML = data.vehicles?.map(v => `
            <div class="vehicle-card" onclick="showDetail(${v.id})">
                <div class="plate-tag">${v.plate}</div>
                <div style="margin-top:10px; font-weight:600">${v.owner_name || 'Sin nombre'}</div>
                <div style="font-size:0.8rem; color:var(--muted)">${v.brand || ''} · ${v.parking_spot || 'A-1'}</div>
            </div>
        `).join('') || '<p>No hay vehículos</p>';
    }

    // --- API FUNCTIONS ---
    async function apiFetch(path, options = {}) {
        const token = localStorage.getItem('token');
        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...options.headers };
        try {
            const res = await fetch(API_BASE + path, { ...options, headers });
            if (!res.ok) throw new Error('API Error');
            return await res.json();
        } catch (e) {
            toast('Error de conexión', 'error');
            return null;
        }
    }

    async function loadDashboardData() {
        const stats = await apiFetch('/api/dashboard/today');
        if (stats) {
            document.getElementById('val-parked').textContent = stats.total || 0;
            document.getElementById('val-checkins').textContent = stats.checkins || 0;
            document.getElementById('val-earnings').textContent = '$' + (stats.earnings || 0);
        }
        const vehs = await apiFetch('/api/vehicles/active');
        if (vehs) {
            document.getElementById('dash-recent').innerHTML = vehs.vehicles?.slice(0,4).map(v => `
                <div class="vehicle-card"><div class="plate-tag">${v.plate}</div><div>${v.brand || ''}</div></div>
            `).join('') || '';
        }
    }

    async function processCheckin() {
        const body = {
            plate: document.getElementById('in-plate').value.toUpperCase(),
            owner_name: document.getElementById('in-owner').value,
            owner_phone: document.getElementById('in-phone').value,
            brand: document.getElementById('in-brand').value,
            damage_json: JSON.stringify(currentDamageMarks),
            damage_notes: document.getElementById('in-notes').value,
            photos: photoData // Enviamos las base64
        };
        
        if (!body.plate) return toast('La placa es obligatoria', 'error');
        
        toast('Guardando registro...', 'info');
        const res = await apiFetch('/api/events/checkin', { 
            method: 'POST', 
            body: JSON.stringify(body) 
        });
        
        if (res) {
            toast('✅ Vehículo registrado con éxito', 'success');
            showTab('dashboard');
        }
    }

    // --- UTILS ---
    function toast(msg, type = 'info') {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.borderLeft = `5px solid ${type === 'error' ? 'var(--accent2)' : 'var(--success)'}`;
        t.textContent = msg;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    async function loadSettings() {
        const data = await apiFetch('/api/settings');
        if (data) settings = { ...settings, ...data };
    }

    function openModal() { document.getElementById('modal-container').classList.add('open'); }
    function closeModal() { document.getElementById('modal-container').classList.remove('open'); }
    function fmtDate(d) { return d ? new Date(d).toLocaleString('es-VE') : '—'; }
    function logout() { localStorage.removeItem('token'); location.reload(); }
</script>

</body>
</html>

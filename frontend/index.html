<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Valet Eye — Smart Parking</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2343/2343894.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --gold: #f5c842;
    --green: #2dce89;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-body: 'Inter', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- LOGIN --- */
  #login-screen {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px;
  }
  .login-logo {
    font-family: var(--font-display);
    font-size: 3rem; font-weight: 800;
    letter-spacing: -2px;
  }
  .login-logo span { color: var(--accent); }
  .login-subtitle { color: var(--muted); font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; }
  .pin-display {
    display: flex; gap: 12px; margin: 8px 0;
  }
  .pin-dot {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    transition: all 0.2s;
  }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-pad {
    display: grid; grid-template-columns: repeat(3, 72px);
    gap: 12px;
  }
  .pin-btn {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text); font-size: 1.4rem;
    font-family: var(--font-display); font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .pin-btn:hover { background: var(--surface); border-color: var(--accent); transform: scale(1.05); }
  .pin-btn:active { transform: scale(0.95); }
  .pin-btn.del { font-size: 1rem; color: var(--muted); }
  .pin-error { color: var(--accent2); font-size: 0.85rem; min-height: 20px; }

  /* --- LAYOUT --- */
  #app { display: none; min-height: 100vh; flex-direction: column; }
  #app.visible { display: flex; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 64px;
    position: sticky; top: 0; z-index: 50;
  }
  .header-logo {
    font-family: var(--font-display);
    font-size: 1.4rem; font-weight: 800;
    letter-spacing: -1px;
  }
  .header-logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .staff-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .staff-badge strong { color: var(--text); }
  .btn-logout {
    background: none; border: 1px solid var(--border);
    color: var(--muted); padding: 6px 14px; border-radius: 8px;
    cursor: pointer; font-size: 0.8rem;
    transition: all 0.15s;
  }
  .btn-logout:hover { border-color: var(--accent2); color: var(--accent2); }

  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; padding: 0 24px; gap: 4px;
    overflow-x: auto;
  }
  .nav-tab {
    padding: 12px 20px;
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-family: var(--font-body); font-size: 0.85rem;
    font-weight: 500; white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { flex: 1; padding: 24px; max-width: 1280px; margin: 0 auto; width: 100%; }

  /* --- DASHBOARD --- */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent-color, var(--accent));
  }
  .stat-label {
    font-size: 0.75rem; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: 2.4rem; font-weight: 800;
    line-height: 1;
  }
  .stat-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* --- VEHICLE LIST --- */
  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
  }
  .list-title {
    font-family: var(--font-display);
    font-size: 1.3rem; font-weight: 700;
  }
  .search-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px;
    color: var(--text); font-family: var(--font-body); font-size: 0.9rem;
    width: 240px; outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .filter-tabs {
    display: flex; gap: 8px;
  }
  .filter-tab {
    padding: 6px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; color: var(--muted);
    cursor: pointer; font-size: 0.8rem;
    transition: all 0.15s;
  }
  .filter-tab:hover, .filter-tab.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff;
  }

  .vehicle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .vehicle-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .vehicle-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .vehicle-card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 12px;
  }
  .plate-tag {
    font-family: var(--font-mono);
    font-size: 1.1rem; font-weight: 500;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px;
    letter-spacing: 2px;
  }
  .status-badge {
    font-size: 0.7rem; font-weight: 500;
    padding: 4px 10px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .status-parked { background: #1a3a2a; color: var(--green); }
  .status-retrieved { background: #2a2a3a; color: var(--muted); }
  .status-pending_retrieval { background: #3a2a1a; color: var(--gold); }
  .vehicle-name { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
  .vehicle-meta { font-size: 0.8rem; color: var(--muted); }
  .vehicle-ticket {
    font-family: var(--font-mono); font-size: 0.75rem;
    color: var(--accent); margin-top: 8px;
  }
  .spot-badge {
    position: absolute; bottom: 14px; right: 14px;
    font-family: var(--font-mono); font-size: 0.7rem;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 4px; color: var(--muted);
  }

  /* --- MODAL --- */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 1.3rem; font-weight: 700;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-close {
    background: none; border: none; color: var(--muted);
    font-size: 1.2rem; cursor: pointer;
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .modal-close:hover { background: var(--surface2); color: var(--text); }

  /* --- FORMS --- */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .form-grid .full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 0.75rem; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted);
  }
  .field input, .field select, .field textarea {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
    color: var(--text); font-family: var(--font-body); font-size: 0.9rem;
    outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field select option { background: var(--surface2); }
  .field textarea { resize: vertical; min-height: 72px; }

  /* Photo audit grid */
  .photo-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    margin: 4px 0;
  }
  .photo-slot {
    aspect-ratio: 4/3;
    background: var(--surface2); border: 1px dashed var(--border);
    border-radius: 8px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; cursor: pointer; font-size: 0.75rem; color: var(--muted);
    transition: all 0.2s; overflow: hidden; position: relative;
  }
  .photo-slot:hover { border-color: var(--accent); }
  .photo-slot img {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  }
  .photo-slot input[type=file] { display: none; }
  .photo-label { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

  /* --- BUTTONS --- */
  .btn {
    padding: 10px 20px; border-radius: 8px;
    font-family: var(--font-body); font-size: 0.9rem; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
  }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-secondary {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn-success { background: var(--green); color: #0a2a1a; }
  .btn-warning { background: var(--gold); color: #2a1a0a; }
  .btn-danger { background: var(--accent2); color: #fff; }
  .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
  .modal-actions {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 20px; padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* --- TICKET PRINT VIEW --- */
  .ticket {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
    font-family: var(--font-mono); font-size: 0.85rem;
    text-align: center; margin: 16px 0;
  }
  .ticket-code {
    font-size: 2rem; font-weight: 500;
    color: var(--accent); letter-spacing: 4px;
    margin: 8px 0;
  }
  .barcode {
    font-size: 2.5rem; letter-spacing: 4px;
    color: var(--text); margin: 4px 0;
    font-family: 'Libre Barcode 128', cursive;
  }
  .ticket-divider { border: none; border-top: 1px dashed var(--border); margin: 12px 0; }

  /* --- DETAIL PANEL --- */
  .detail-section { margin-bottom: 20px; }
  .detail-section-title {
    font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .detail-row {
    display: flex; justify-content: space-between;
    padding: 6px 0; font-size: 0.875rem;
  }
  .detail-row .label { color: var(--muted); }
  .detail-row .value { font-weight: 500; text-align: right; }
  .detail-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }

  /* --- RESERVATIONS --- */
  .reservation-list { display: flex; flex-direction: column; gap: 12px; }
  .reservation-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .res-info { flex: 1; }
  .res-name { font-weight: 600; margin-bottom: 4px; }
  .res-meta { font-size: 0.8rem; color: var(--muted); }
  .res-time {
    font-family: var(--font-mono); font-size: 0.95rem;
    color: var(--gold); white-space: nowrap;
  }

  /* --- TOAST --- */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 300;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px;
    font-size: 0.875rem; min-width: 240px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: fadeInRight 0.3s ease;
  }
  @keyframes fadeInRight {
    from { opacity: 0; transform: translateX(16px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .toast-success { border-left: 3px solid var(--green); }
  .toast-error { border-left: 3px solid var(--accent2); }
  .toast-info { border-left: 3px solid var(--accent); }

  /* Responsive */
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .vehicle-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }

  /* Empty state */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-text { font-size: 1rem; margin-bottom: 6px; color: var(--text); }
  .empty-sub { font-size: 0.85rem; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div>
    <div class="login-logo">Valet<span>OS</span></div>
    <div class="login-subtitle" style="text-align:center;margin-top:4px;">Sistema de Valet Parking</div>
  </div>
  <div class="pin-display" id="pin-display">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn del" onclick="pinClear()">✕</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-logo">Valet<span>OS</span></div>
    <div class="header-right">
      <div class="staff-badge">Operador: <strong id="staff-name">—</strong></div>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </header>
  <nav>
    <button class="nav-tab active" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="nav-tab" onclick="showTab('vehicles')">🚗 Vehículos</button>
    <button class="nav-tab" onclick="showTab('checkin')">📥 Check-In</button>
    <button class="nav-tab" onclick="showTab('checkout')">📤 Check-Out</button>
    <button class="nav-tab" onclick="showTab('reservations')">📅 Reservas</button>
    <button class="nav-tab" id="tab-staff" onclick="showTab('staff')" style="display:none">👥 Personal</button>
    <button class="nav-tab" id="tab-reports" onclick="showTab('reports')" style="display:none">📊 Reportes</button>
    <button class="nav-tab" onclick="showTab('slots')">🗺️ Mapa</button>
    <button class="nav-tab" onclick="showTab('history')">📜 Historial</button>
    <button class="nav-tab" id="tab-settings" onclick="showTab('settings')" style="display:none">⚙️ Ajustes</button>
  </nav>
  <main id="main-content"></main>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-vehicle-detail">
  <div class="modal">
    <div class="modal-title">Detalle del Vehículo <button class="modal-close" onclick="closeModal('modal-vehicle-detail')">×</button></div>
    <div id="vehicle-detail-content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-ticket">
  <div class="modal">
    <div class="modal-title">🎫 Resguardo <button class="modal-close" onclick="closeModal('modal-ticket')">×</button></div>
    <div id="ticket-content"></div>
    <div style="margin-top:20px; text-align:center; display:flex; flex-direction:column; gap:10px;">
      <button class="btn btn-success" id="btn-wa" style="background:#25D366; border:none;" onclick="sendWhatsApp()">
        <img src="https://cdn-icons-png.flaticon.com/512/124/124034.png" style="width:16px; margin-right:8px; vertical-align:middle; filter:brightness(0) invert(1)"> Enviar Ticket WhatsApp
      </button>
      <button class="btn btn-primary" onclick="closeModal('modal-ticket')">Cerrar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-add-staff">
  <div class="modal">
    <div class="modal-title">Registrar Nuevo Personal <button class="modal-close" onclick="closeModal('modal-add-staff')">×</button></div>
    <div style="padding:20px;">
      <div class="form-group" style="margin-bottom:15px;">
        <label style="display:block;margin-bottom:5px;color:var(--muted)">Nombre Completo</label>
        <input type="text" id="ns-name" style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;">
      </div>
      <div class="form-group" style="margin-bottom:15px;">
        <label style="display:block;margin-bottom:5px;color:var(--muted)">PIN de Acceso (4 dígitos)</label>
        <input type="password" id="ns-pin" maxlength="4" style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;">
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label style="display:block;margin-bottom:5px;color:var(--muted)">Rol</label>
        <select id="ns-role" style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;">
          <option value="driver">Chofer (Driver)</option>
          <option value="supervisor">Supervisor</option>
          <option value="director">Director</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-secondary" style="flex:1" onclick="closeModal('modal-add-staff')">Cancelar</button>
        <button class="btn btn-primary" style="flex:1" onclick="submitAddStaff()">Guardar</button>
      </div>
    </div>
  </div>
</div>
  <div class="modal" style="max-width: 800px;">
    <div class="modal-title">📸 Inspección Fotográfica <button class="modal-close" onclick="closeModal('modal-photos')">×</button></div>
    <div id="photos-content" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 16px;">
      <!-- Las fotos se cargarán aquí -->
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ==================== CONFIG ====================
// const API_BASE = window.location.origin; // Usar esto cuando el frontend esté servido desde el mismo dominio
// const API_BASE = 'http://localhost:8787'; // Para pruebas locales con Wrangler
// Registrar Service Worker para PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      console.log('SW registrado', reg);
    }).catch(err => {
      console.log('SW falló', err);
    });
  });

const API_BASE = 'https://valet-parking-api.smart-group.workers.dev'; // Producción real

function addDamageMark(e) {
  const svg = document.getElementById('car-diagram');
  const rect = svg.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 200;
  const y = ((e.clientY - rect.top) / rect.height) * 400;
  currentDamageMarks.push({ x, y });
  renderDamageMarks();
}

function renderDamageMarks() {
  const g = document.getElementById('damage-marks');
  if (!g) return;
  g.innerHTML = currentDamageMarks.map(m => `
    <circle cx="${m.x}" cy="${m.y}" r="8" fill="var(--accent2)" stroke="white" stroke-width="2" />
  `).join('');
}

  currentDamageMarks = [];
  renderDamageMarks();

// ==================== PIN LOGIN ====================
let pinBuffer = '';

function pinPress(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d;
  updatePinDisplay();
  if (pinBuffer.length === 4) setTimeout(tryLogin, 200);
}
function pinDel() { pinBuffer = pinBuffer.slice(0,-1); updatePinDisplay(); }
function pinClear() { pinBuffer = ''; updatePinDisplay(); }
function updatePinDisplay() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d'+i).classList.toggle('filled', i < pinBuffer.length);
  }
}
async function tryLogin() {
  try {
    const res = await fetch(`${API_BASE}/api/staff/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({pin: pinBuffer})
    });
    if (!res.ok) throw new Error('PIN inválido');
    currentStaff = await res.json();
    localStorage.setItem('token', currentStaff.token);
    
    if (currentStaff.role === 'supervisor' || currentStaff.role === 'director') {
      document.getElementById('tab-staff').style.display = 'block';
      document.getElementById('tab-reports').style.display = 'block';
      document.getElementById('tab-settings').style.display = 'block';
    } else {
      document.getElementById('tab-staff').style.display = 'none';
      document.getElementById('tab-reports').style.display = 'none';
      document.getElementById('tab-settings').style.display = 'none';
    }
    
    document.getElementById('staff-name').textContent = currentStaff.name;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    showTab('dashboard');
    toast('Bienvenido, ' + currentStaff.name, 'success');
  } catch(e) {
    document.getElementById('pin-error').textContent = 'PIN incorrecto. Intente nuevamente.';
    pinBuffer = '';
    updatePinDisplay();
    setTimeout(() => document.getElementById('pin-error').textContent = '', 2000);
  }
}
function logout() {
  currentStaff = null; pinBuffer = ''; updatePinDisplay();
  localStorage.removeItem('token');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('visible');
}

async function bulkCreateSlots() {
  const zone = document.getElementById('set-zone').value.toUpperCase();

  const to = parseInt(document.getElementById('set-to').value);

  if (!zone || isNaN(from) || isNaN(to)) {
    toast('Completa todos los campos', 'error');
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/api/slots/bulk`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
      body: JSON.stringify({ zone, from, to })
    });
    if (!res.ok) throw new Error();
    toast('Espacios creados con éxito', 'success');
    document.getElementById('set-zone').value = '';

async function loadDashboard() {
  try {
    const [stats, vehs] = await Promise.all([
      fetch(`${API_BASE}/api/dashboard/today`, { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } }).then(r=>{if(!r.ok)throw r; return r.json()}).catch(()=>({checkins:0,checkouts:0,total:0,slots_occupied:0,slots_total:0})),
      fetch(`${API_BASE}/api/vehicles/active`, { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } }).then(r=>{if(!r.ok)throw r; return r.json()}).catch(()=>({vehicles:[]}))
    ]);
    document.getElementById('stat-parked').textContent = stats.total ?? 0;
    document.getElementById('stat-checkins_today').textContent = stats.checkins ?? 0;
    document.getElementById('stat-revenue_today').textContent = '$' + (stats.earnings ?? 0).toLocaleString();
    
    // Calcular ocupación
    if (stats.slots_total > 0) {
      const pct = Math.round((stats.slots_occupied / stats.slots_total) * 100);
      document.getElementById('stat-occupancy').textContent = pct + '%';
      const bar = document.getElementById('stat-occupancy-bar');
      bar.style.width = pct + '%';
      bar.style.background = pct > 90 ? 'var(--accent2)' : (pct > 70 ? 'var(--warning)' : 'var(--success)');
      
      const warning = document.getElementById('capacity-warning');
      if (pct >= 90) {
        warning.style.display = 'block';
        document.getElementById('cap-val').textContent = pct;
      } else {
        warning.style.display = 'none';
      }
    }
    
    vehicles = vehs.vehicles || [];
    renderVehicleCards(document.getElementById('dashboard-vehicles'), vehicles.slice(0,6));
  } catch(e) {
    vehicles = mockVehicles();
    renderVehicleCards(document.getElementById('dashboard-vehicles'), vehicles.slice(0,6));
  }
}

async function loadVehicles() {
  const grid = document.getElementById('vehicles-grid');
  if (!grid) return;
  try {
    let url = `${API_BASE}/api/vehicles?`;
    if (vehicleFilter) url += `status=${vehicleFilter}&`;
    if (searchQuery) url += `search=${encodeURIComponent(searchQuery)}`;
    const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } });
    if (!res.ok) throw new Error('Error al cargar');
    const data = await res.json();
    vehicles = Array.isArray(data) ? data : mockVehicles();
  } catch {
    vehicles = mockVehicles().filter(v => !vehicleFilter || v.status === vehicleFilter);

async function openPhotos(id) {
  const el = document.getElementById('photos-content');
  el.innerHTML = '<div style="color:var(--muted); grid-column: 1/-1; text-align:center;">Cargando fotos...</div>';
  
  try {
    const res = await fetch(`${API_BASE}/api/vehicles/${id}/photos`, {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
    });
    const { photos } = await res.json();
    
    if (photos.length === 0) {
      el.innerHTML = '<div style="color:var(--muted); grid-column: 1/-1; text-align:center;">No hay fotos registradas.</div>';
    } else {
      el.innerHTML = photos.map(p => `
        <div class="stat-card" style="padding:0; height:300px; border:none; background:var(--surface2);">
          <img src="${API_BASE}/api/photos/${p.url}" style="width:100%; height:100%; object-fit:cover; border-radius:12px;" onerror="this.src='https://placehold.co/400x300?text=Error+al+cargar'">
        </div>

    el.innerHTML = '<div style="color:var(--accent2); grid-column: 1/-1; text-align:center;">Error al cargar las fotos.</div>';
  }
  openModal('modal-photos');
}
function dRow(label, value) {
  return `<div class="detail-row"><span class="label">${label}</span><span class="value">${value}</span></div>`;
}

async function markPendingPickup(id) {
  await apiPatch(id, {status:'pending_retrieval', action:'PENDING_PICKUP', actor: currentStaff?.name});
  toast('Marcado como pendiente de recolección', 'info');
  closeModal('modal-vehicle-detail');
  if (currentTab === 'vehicles') loadVehicles();
}

async function editField(id, field, label, current) {
  const val = prompt(`${label}:`, current);
  if (val === null) return;
  const data = {};
  data[field] = val;
  try {
    const res = await fetch(`${API_BASE}/api/vehicles/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error();
    toast('Actualizado correctamente', 'success');
    showVehicleDetail(id);
    if (currentTab === 'vehicles') loadVehicles();
    if (currentTab === 'dashboard') loadDashboard();
    if (currentTab === 'slots') loadSlots();
  } catch (e) {
    toast('Error al actualizar', 'error');
  }
}

async function doCheckout(id) {
  const fee = prompt('¿Monto a cobrar? (0 si ya fue prepagado)', '0');
  if (fee === null) return;
  const method = prompt('Método de pago: efectivo / tarjeta / app', 'efectivo');
  await apiPatch(id, {
    status: 'retrieved',
    check_out_at: new Date().toISOString(),
    valet_out: currentStaff?.name,
    fee_amount: parseFloat(fee)||0,
    fee_paid: 1,
    payment_method: method,
    action: 'CHECK_OUT',
    actor: currentStaff?.name
  });
  toast('Vehículo entregado exitosamente ✅', 'success');
  closeModal('modal-vehicle-detail');
  if (currentTab === 'vehicles') loadVehicles();
  if (currentTab === 'dashboard') showTab('dashboard');
}

async function apiPatch(id, data) {
  try {
    await fetch(`${API_BASE}/api/vehicles/${id}`, {
      method: 'PATCH',
      headers:{'Content-Type':'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token')},
      body: JSON.stringify(data)
    });
  } catch {}
}

let photoData = {};
function triggerPhoto(i) { document.getElementById('photo-input-'+i).click(); }
function loadPhoto(i, inp) {
  const file = inp.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    photoData[i] = e.target.result;
    const slot = document.getElementById('photo-slot-'+i);
    let img = slot.querySelector('img');
    if (!img) { img = document.createElement('img'); slot.appendChild(img); }
    img.src = e.target.result;
    slot.querySelectorAll('span').forEach(s => s.style.display='none');
  };
  reader.readAsDataURL(file);
}

async function submitCheckin() {
  const plate = document.getElementById('ci-plate').value.trim();
  const owner_name = document.getElementById('ci-owner').value.trim();
  if (!plate || !owner_name) { toast('Placa y propietario son requeridos', 'error'); return; }
    const body = {
      plate, owner_name,
      brand: document.getElementById('ci-brand').value,
      model: document.getElementById('ci-model').value,
      color: document.getElementById('ci-color').value,
      owner_phone: document.getElementById('ci-phone').value,
      key_hook: document.getElementById('ci-hook').value,
      parking_spot: document.getElementById('ci-spot').value,
      damage_notes: document.getElementById('ci-damage').value,
      damage_json: JSON.stringify(currentDamageMarks),
      fee_amount: parseFloat(document.getElementById('ci-fee').value)||0,
      valet_in: currentStaff?.name || 'Sistema',
      photo_front: photoData[0]||null,
      photo_rear: photoData[1]||null,
      photo_left: photoData[2]||null,
      photo_right: photoData[3]||null,
    };
  try {
    const res = await fetch(`${API_BASE}/api/events/checkin`, {
      method:'POST', headers:{'Content-Type':'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token')}, body: JSON.stringify(body)
    });
    
    // Subir fotos si existen
    for (const [i, img] of Object.entries(photoData)) {
      await fetch(`${API_BASE}/api/photos/upload`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
        body: JSON.stringify({ plate, image: img, type: ['front','rear','left','right'][i] })
      });
    }

    toast('Ingreso registrado exitosamente ✅', 'success');
    
    // Marcar reserva como llegada si aplica
    if (pendingReservationId) {
      try {
        await fetch(`${API_BASE}/api/reservations/${pendingReservationId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
          body: JSON.stringify({ status: 'arrived' })
        });
        pendingReservationId = null;
      } catch (e) {}
    }

    const ticket = await res.json();
    showTicket(ticket);
    loadDashboard();
  } catch {
    // Demo mode: generate local ticket
    const ticket_code = 'V' + Date.now().toString(36).toUpperCase();
    const barcode = Math.random().toString(36).substring(2,10).toUpperCase();
    toast('Vehículo registrado (demo): ' + ticket_code, 'success');
    showTicket({...body, ticket_code, barcode, check_in_at: new Date().toISOString()});
  }
}

async function updateActiveDatalist(query) {
  if (query.length < 2) return;
  try {
    const res = await fetch(`${API_BASE}/api/vehicles/predictive?q=${encodeURIComponent(query)}`, {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
    });
    const data = await res.json();
    const list = document.getElementById('active-plates');
    list.innerHTML = data.map(v => `
      <option value="${v.plate}">Cliente: ${v.owner_name} (${v.visit_count} visitas)</option>
    `).join('');
    
    const exact = data.find(x => x.plate.toUpperCase() === query.toUpperCase());
    if (exact && exact.visit_count >= 3) {
      toast(`⭐ Cliente Frecuente: ${exact.owner_name} (${exact.visit_count} visitas)`, 'info');
    }
  } catch (e) {}
}

function exportToCSV() {
  fetch(`${API_BASE}/api/reports/financial`, {
    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
  }).then(r => r.json()).then(data => {
    let csv = 'Fecha,Servicios,Ingresos\n';
    data.daily.forEach(d => { csv += `${d.date},${d.services},${d.total}\n`; });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.setAttribute('href', url);
    a.setAttribute('download', 'reporte_valet.csv');
    a.click();
  });
}

        <div class="vehicle-card-top">
          <div style="font-weight:700; color:var(--accent1)">${r.confirm_code}</div>
          <span class="status-badge" style="background:var(--surface2); color:var(--text)">PENDIENTE</span>
        </div>
        <div class="vehicle-name" style="margin-top:10px; font-weight:600;">${r.owner_name}</div>
        <div class="vehicle-meta">${r.plate ? 'Placa: '+r.plate : 'Placa no registrada'} · ${r.brand||''}</div>
        <div style="margin-top:15px; font-size:0.9rem; color:var(--accent1); font-weight:600;">
          ⏳ Llegada: ${fmtDate(r.expected_arrival)}
        </div>
        <div style="margin-top:20px;">
          <button class="btn btn-primary btn-sm" style="width:100%" onclick='startCheckinFromReservation(${JSON.stringify(r).replace(/'/g, "\\'")})'>
            🚗 Registrar Llegada
          </button>
        </div>
      </div>`).join('') || '<div class="empty" style="grid-column:1/-1">Sin reservas pendientes</div>';
  } catch (e) {
    document.getElementById('reservations-list').innerHTML = '<div class="empty" style="grid-column:1/-1">Error al cargar reservas</div>';
  }
}

async function startCheckinFromReservation(r) {
  pendingReservationId = r.id;
  showTab('checkin');
  
  // Esperar a que se renderice la pestaña de checkin
  setTimeout(() => {
    if(document.getElementById('ci-plate')) document.getElementById('ci-plate').value = r.plate || '';
    if(document.getElementById('ci-owner')) document.getElementById('ci-owner').value = r.owner_name || '';
    if(document.getElementById('ci-phone')) document.getElementById('ci-phone').value = r.owner_phone || '';
    if(document.getElementById('ci-brand')) document.getElementById('ci-brand').value = r.brand || '';
    if(document.getElementById('ci-model')) document.getElementById('ci-model').value = r.model || '';
    toast('Datos cargados desde reserva. Completa el registro.', 'info');
  }, 200);
}

function openNewReservation() {
  const el = document.getElementById('vehicle-detail-content');
  el.innerHTML = `
    <div class="form-grid">
      <div class="field full"><label>Nombre Propietario *</label><input id="nr-name" placeholder="Nombre completo"/></div>
      <div class="field"><label>Teléfono *</label><input id="nr-phone" type="tel" placeholder="+1 555 0000"/></div>
      <div class="field"><label>Llegada Esperada *</label><input id="nr-arrival" type="datetime-local"/></div>
      <div class="field"><label>Placa</label><input id="nr-plate" placeholder="ABC-1234"/></div>
      <div class="field"><label>Marca</label><input id="nr-brand" placeholder="Toyota"/></div>
      <div class="field"><label>Modelo</label><input id="nr-model" placeholder="Corolla"/></div>
      <div class="field full"><label>Notas</label><textarea id="nr-notes" placeholder="Instrucciones especiales…"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-vehicle-detail')">Cancelar</button>
      <button class="btn btn-primary" onclick="submitReservation()">Confirmar Reserva</button>
    </div>`;
  document.getElementById('modal-vehicle-detail').querySelector('.modal-title').innerHTML =
    '📅 Nueva Reservación <button class="modal-close" onclick="closeModal(\'modal-vehicle-detail\')">×</button>';
  openModal('modal-vehicle-detail');
}

async function submitReservation() {
  const name = document.getElementById('nr-name').value.trim();
  const phone = document.getElementById('nr-phone').value.trim();
  const arrival = document.getElementById('nr-arrival').value;
  if (!name||!phone||!arrival) { toast('Nombre, teléfono y llegada son requeridos','error'); return; }
  
  const body = { 
    owner_name: name, 
    owner_phone: phone, 
    expected_arrival: arrival,
    plate: document.getElementById('nr-plate').value.toUpperCase(),
    brand: document.getElementById('nr-brand').value,
    model: document.getElementById('nr-model').value,
    notes: document.getElementById('nr-notes').value 
  };
  
  try {
    const res = await fetch(`${API_BASE}/api/reservations`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error();
    const created = await res.json();
    toast('Reserva confirmada: ' + created.confirm_code, 'success');
    closeModal('modal-vehicle-detail');
    showTab('reservations');
  } catch {
    toast('Error al registrar reserva', 'error');
  }
}

// ==================== TICKET ====================
function showTicket(v) {
  lastTicket = v;
  const since = v.check_in_at ? Math.round((Date.now() - new Date(v.check_in_at))/60000) : 0;
  document.getElementById('ticket-content').innerHTML = `
    <div class="ticket">
      <div style="font-size:0.7rem;letter-spacing:3px;color:var(--muted)">VALET OS — RESGUARDO</div>
      <div class="ticket-code">${v.ticket_code||'—'}</div>
      <hr class="ticket-divider"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:left;margin:12px 0">
        <div><div style="color:var(--muted);font-size:0.7rem">PLACA</div><div style="font-size:1rem">${v.plate}</div></div>
        <div><div style="color:var(--muted);font-size:0.7rem">LUGAR</div><div>${v.parking_spot||'POR ASIGNAR'}</div></div>
        <div><div style="color:var(--muted);font-size:0.7rem">PROPIETARIO</div><div>${v.owner_name}</div></div>
        <div><div style="color:var(--muted);font-size:0.7rem">VEHÍCULO</div><div>${v.brand||''} ${v.model||''}</div></div>
        <div><div style="color:var(--muted);font-size:0.7rem">ENTRADA</div><div>${fmtDate(v.check_in_at)}</div></div>
        <div><div style="color:var(--muted);font-size:0.7rem">TARIFA</div><div>${v.fee_amount ? '$'+v.fee_amount : 'Por determinar'}</div></div>
      </div>
      <hr class="ticket-divider"/>
      <div style="font-size:0.65rem;color:var(--muted);margin-top:6px">Presente este resguardo al retirar su vehículo.<br/>Custodia bajo vigilancia permanente.</div>
    </div>`;
  
  // Mostrar/ocultar botón WhatsApp según si hay teléfono
  const btnWa = document.getElementById('btn-wa');
  if (btnWa) btnWa.style.display = v.owner_phone ? 'block' : 'none';
  
  closeModal('modal-vehicle-detail');
  openModal('modal-ticket');
}

function sendWhatsApp() {
  if (!lastTicket) return;
  const phone = lastTicket.owner_phone.replace(/\D/g, '');
  const ticketUrl = `${API_BASE}/ticket/${lastTicket.ticket_code}`;
  const msg = `🚗 *Ticket Digital Valet Eye*\n\nHola *${lastTicket.owner_name}*, tu vehículo *${lastTicket.brand||''} ${lastTicket.model||''}* (Placa: *${lastTicket.plate}*) ha sido registrado.\n\n📌 *Ver Estado y Solicitar Auto:* ${ticketUrl}\n\n_Usa el enlace de arriba para pedir tu auto cuando estés listo para retirarte._`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ==================== UTILS ====================
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('es', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast-item toast-${type}`;
  t.textContent = msg;
  document.getElementById('toast').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target === o) o.classList.remove('open'); });
});

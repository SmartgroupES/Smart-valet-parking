<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EYE STAFF — Sistema de Gestión</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #6366f1;
            --accent2: #f43f5e;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --brand-red: #ef4444;
            --brand-white: #ffffff;
            --bg: #0b0f19;
            --surface: #161b2c;
            --surface2: #1e253c;
            --border: rgba(255,255,255,0.08);
            --text: #f1f5f9;
            --muted: #94a3b8;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        .brand-eye { color: var(--brand-red); }
        .brand-staff { color: var(--brand-white); }
        .logo-text { font-weight: 800; letter-spacing: -0.5px; display: flex; gap: 6px; align-items: center; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: var(--font-main);
            display: flex; height: 100vh; height: 100dvh; overflow: hidden;
            text-transform: uppercase;
        }
        
        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out;
        }
        .splash-logo { height: 200px; object-fit: contain; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

        /* --- SCREEN SAVER & PATTERN LOCK --- */
        #screensaver {
            position: fixed; inset: 0; background: #000; z-index: 9000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #pattern-container { margin-top: 50px; display: none; }
        .pattern-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 20px; }
        .pattern-dot { width: 20px; height: 20px; background: #334155; border-radius: 50%; margin: 30px auto; cursor: pointer; position: relative; }
        .pattern-dot.active { background: var(--danger); box-shadow: 0 0 15px var(--danger); }
        .pattern-line { position: absolute; background: var(--danger); height: 4px; transform-origin: 0 50%; pointer-events: none; }

        /* --- FLOATING CHAT --- */
        .floating-chat {
            position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px;
            background: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(244, 63, 94, 0.4); cursor: pointer; z-index: 8000;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .floating-chat:hover { transform: scale(1.1) rotate(5deg); }
        .floating-chat:active { transform: scale(0.9); }
        .floating-chat i { font-size: 2.2rem; }

        input, select, textarea, button { text-transform: uppercase !important; text-align: left !important; }
        ::placeholder { font-size: 0.8rem; opacity: 0.5; text-align: left; }

        /* --- LAYOUT --- */
        #app { display: flex; flex-direction: column; height: 100vh; width: 100%; max-width: none; }

        header {
            background: var(--surface);
            padding: 12px 20px;
            padding-top: max(12px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.4rem; color: var(--accent); letter-spacing: -0.5px; }
        .logo span { color: #fff; }

        .main-container { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

        /* --- TOP NAVIGATION --- */
        .sidebar {
            width: 100%;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: row;
            padding: 0 5px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* iOS momentum scroll */
            scrollbar-width: none; 
        }
        .sidebar::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            min-width: 70px;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.2s;
            font-size: 0.65rem;
            text-align: center;
            gap: 4px;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
        }

        .nav-item i { font-size: 1.3rem; font-style: normal; line-height: 1; }
        .nav-item.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(59, 130, 246, 0.05); }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.02); }

        /* --- CONTENT --- */
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            width: 100%;
            max-width: none;
            padding-bottom: calc(150px + env(safe-area-inset-bottom));
        }

        /* --- OVERLAYS --- */
        #loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s; }
        #loading-overlay.active { display: flex; }
        .spinner { width: 50px; height: 50px; border: 3px solid var(--surface); border-top-color: var(--accent2); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-logo { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        .loading-logo span { color: var(--accent2); }

        .photo-tooltip-trigger { position: relative; cursor: pointer; }
        .photo-tooltip { 
            position: absolute; bottom: 100%; left: 0; display: none; z-index: 1000;
            background: var(--surface); padding: 5px; border-radius: 10px; 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(-10px);
        }
        .photo-tooltip-trigger:hover .photo-tooltip { display: block; }

        .view-header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .view-title { font-size: 1.8rem; font-weight: 800; margin: 0; }

        /* --- DAMAGE MAP --- */
        .damage-canvas { width: 100%; max-width: 200px; margin: 0 auto; background: var(--surface2); border-radius: 12px; padding: 10px; border: 1px solid var(--border); position: relative; }
        .damage-marks circle { cursor: pointer; }

        /* --- PHOTO SLOTS --- */
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .photo-slot { background: var(--surface2); border: 2px dashed var(--border); border-radius: 12px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .photo-slot.filled { border-style: solid; border-color: var(--success); }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        .photo-label { font-size: 0.6rem; color: var(--muted); margin-top: 4px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .footer-info {
            margin-top: 50px;
            padding-bottom: 50px;
            text-align: center;
            color: var(--muted);
            font-size: 0.7rem;
            letter-spacing: 1px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .chat-access-btn {
            background: #25D366;
            color: white;
            padding: 12px 30px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px auto;
            width: fit-content;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr !important; }
            .view-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .sidebar { padding: 5px 0; }
        }
        .stat-card {
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .stat-label { font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
        .stat-value { font-size: 2rem; font-weight: 800; margin-top: 5px; }

        .vehicle-card {
            background: var(--surface2);
            border-radius: 18px;
            padding: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .vehicle-card:active { transform: scale(0.98); }
        .plate-tag {
            background: #fff;
            color: #000;
            padding: 4px 12px;
            border-radius: 8px;
            font-family: var(--font-mono);
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1;
        }

        /* --- BUTTONS --- */
        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font-main);
            display: grid;
            place-items: center;
            text-align: center;
            line-height: 1.2;
            transition: all 0.2s;
        }
        .btn-sm { padding: 8px 14px; font-size: 0.85rem; }
        .btn-secondary { background: var(--surface2); border: 1px solid var(--border); }
        .btn-danger { background: var(--accent2); }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-overlay.open { display: flex; }
        .modal-content {
            background: rgba(20, 20, 20, 0.8);
            width: 100%;
            max-width: 500px;
            border-radius: 28px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- PHOTO MODAL --- */
        .photo-modal-content { max-width: 800px; padding: 0; background: transparent; border: none; box-shadow: none; overflow: visible; }
        .photo-viewer-container { position: relative; width: 100%; border-radius: 24px; overflow: hidden; background: #000; border: 1px solid var(--border); }
        .photo-viewer-img { width: 100%; display: block; max-height: 70vh; object-fit: contain; }
        .photo-viewer-nav { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; transform: translateY(-50%); padding: 0 10px; pointer-events: none; }
        .photo-nav-btn { background: rgba(0,0,0,0.5); color: #fff; border: none; width: 50px; height: 50px; border-radius: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; pointer-events: auto; backdrop-filter: blur(5px); transition: all 0.2s; }
        .photo-nav-btn:hover { background: var(--accent); }
        .photo-close-btn { position: absolute; top: -50px; right: 0; background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; backdrop-filter: blur(10px); }

        /* --- FORMS --- */
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.9rem; }
        input, select, textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            font-family: var(--font-main);
        }

        /* --- TOAST --- */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 2000; }
        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px 24px;
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } }

        /* --- MENU INICIAL --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 Columnas en PC */
            gap: 20px;
            margin: 40px auto;
            max-width: 100%;
            width: 100%;
        }
        .menu-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-decoration: none;
            color: inherit;
        }
        .menu-item:active { transform: scale(0.95); background: var(--surface); }
        .menu-item i { font-size: 2.5rem; font-style: normal; }
        .menu-item-content { display: flex; flex-direction: column; gap: 4px; }
        .menu-item-title { font-weight: 800; font-size: 1.3rem; color: #fff; letter-spacing: -0.5px; }
        .menu-item-desc { font-size: 0.75rem; color: var(--muted); font-weight: 600; }

        .back-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px auto;
            cursor: pointer;
            color: #000;
            font-weight: 800;
            font-size: 0.8rem;
            width: fit-content;
            padding: 12px 30px;
            background: #fff;
            border-radius: 12px;
            border: none;
            text-align: center;
        }
        @keyframes flash-red-white {
            0% { background-color: var(--accent2); color: white; }
            50% { background-color: white; color: var(--accent2); }
            100% { background-color: var(--accent2); color: white; }
        }
        .no-session-banner {
            display: none;
            padding: 12px;
            text-align: center;
            font-weight: 900;
            font-size: 1rem;
            animation: flash-red-white 1.5s infinite;
            letter-spacing: 2px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }

        .back-nav:active { background: rgba(255,255,255,0.08); }

        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: 1fr 1fr; /* 2 Columnas en Móvil */
                gap: 12px;
            }
            .menu-item {
                flex-direction: column;
                padding: 18px 12px;
                text-align: center;
                gap: 12px;
                border-radius: 20px;
            }
            .menu-item i { font-size: 2rem; }
            .menu-item-title { font-size: 1rem; }
            .menu-item-desc { font-size: 0.65rem; }

            .sidebar { 
                padding: 0 5px;
            }
            .nav-item { 
                padding: 12px 10px; 
                font-size: 0.7rem; 
                min-width: 80px;
            }
            .nav-item span { display: block; }
            main { 
                padding: 16px; 
                padding-bottom: calc(100px + env(safe-area-inset-bottom)); 
            }
            .view-title { font-size: 1.5rem; }
            .grid { grid-template-columns: 1fr; gap: 16px; }
            .stat-value { font-size: 1.8rem; }
            .vehicle-card { padding: 15px; border-radius: 16px; }
            .plate-tag { padding: 4px 10px; font-size: 1rem; }
        }
        .menu-item.disabled {
            opacity: 0.5;
            filter: grayscale(1);
            pointer-events: none;
            cursor: not-allowed;
            border: 1px solid rgba(255,255,255,0.05);
        }
    <script>
        // --- CACHE KILL SWITCH ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) {
                    registration.unregister();
                }
            });
        }
        // Limpiar Cache Storage
        if ('caches' in window) {
            caches.keys().then(names => {
                for (let name of names) caches.delete(name);
            });
        }
    </script>
</head>
<body>

<div id="loading-overlay">
    <a href="https://grupoeyestaff.com" target="_blank" style="text-decoration:none; text-align:center; display:block">
        <div class="logo-text" style="font-size: 2.5rem; justify-content: center; margin-bottom: 20px;">
            <span class="brand-eye">EYE</span><span class="brand-staff">STAFF</span>
        </div>
    </a>
    <div class="spinner"></div>
    <div id="loading-text" style="color:var(--muted); font-weight:600">Procesando...</div>
</div>

<div id="app">
    <header>
        <a href="https://grupoeyestaff.com" target="_blank" style="text-decoration:none; display:block;">
            <div style="line-height:1">
                <div class="logo-text" style="font-size: 1.4rem;">
                    <span class="brand-eye">EYE</span><span class="brand-staff">STAFF</span>
                </div>
                <div id="build-info" style="font-size:0.75rem; color:#fff; font-weight:800; font-family:var(--font-mono); margin-top:4px; letter-spacing:1px; opacity:0.9;">

                🏠 INICIO
            </div>
            <div id="active-session-display" style="font-size:0.7rem; color:var(--accent); font-weight:800; background:rgba(99, 102, 241, 0.1); padding:4px 10px; border-radius:8px; display:none;"></div>

            <span class="brand-eye">EYE</span><span class="brand-staff">STAFF</span>
        </div>
    </div>

    <div id="screensaver" onclick="hideScreenSaver()">
        <div class="logo-text" style="font-size: 3.5rem; letter-spacing: -2px;">
            <span class="brand-eye">EYE</span><span class="brand-staff">STAFF</span>

        <div style="color:var(--danger); font-weight:800; margin-top:20px; font-size:0.7rem; opacity:0.8;">TOQUE PARA CONTINUAR</div>
    </div>

    <main id="current-view">
        <!-- VISTA 1: ECOSISTEMA (PORTAL) -->

            <div class="view-header" style="text-align: center; display: block; margin-bottom: 20px;">

            <!-- SECCIÓN 1: SERVICIOS -->

                            <span class="menu-item-title" style="font-size:1rem;">VALET PARKING</span>

                            <span class="menu-item-title" style="font-size:1rem;">RENTA EQUIPOS 🚧</span>

                        </div>
                    </div>
                    <!-- EYE KIDS -->
                    <div class="menu-item disabled" style="opacity:0.3; filter:grayscale(1);">
                        <i style="font-size:2rem">🎈</i>
                        <div class="menu-item-content">
                            <span class="menu-item-title" style="font-size:1rem;">EYE KIDS</span>
                            <span class="menu-item-desc" style="font-size:0.6rem;">PRÓXIMAMENTE</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN 2: OPERACIONES -->
            <div>
                <h2 style="font-size: 0.9rem; color: var(--muted); margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; letter-spacing: 2px;">OPERACIONES</h2>
                <div class="menu-grid" style="margin-top:0;">
                    <!-- EVENTOS -->
                    <div class="menu-item disabled" style="opacity:0.3; filter:grayscale(1);">
                        <i style="font-size:2rem">📅</i>
                        <div class="menu-item-content">
                            <span class="menu-item-title" style="font-size:1rem;">EVENTOS</span>

<!-- MODALS -->
<div id="modal-container" class="modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal-content" id="modal-body"></div>
</div>

<div id="toast-container"></div>

<script>
    // --- CONFIG & STATE ---
    const API_BASE = window.location.origin;
    let currentTab = 'dashboard';
    let currentStaff = { id: 1, name: 'Director Valet', role: 'director' };
    let vehicles = [];
    let settings = { currency: '$', company_name: 'EYE STAFF' };

    // --- INITIALIZATION ---
    window.onload = async () => {
        console.log('EYE STAFF v2.2.2 Initialized');
        if (!localStorage.getItem('token')) {
            localStorage.setItem('token', 'master-bypass-token');
        }
        
        const loginView = document.getElementById('login-view');
        if (loginView) loginView.style.display = 'none';

        loadSettings().then(() => checkActiveSession());
        
        setTimeout(() => {
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }
        }, 1000);

        initScreenSaver();
        updateClock();
        setInterval(updateClock, 30000); 
    };

    function updateClock() {
        const now = new Date();
        const clockEl = document.getElementById('live-clock');
        if (clockEl) {
            const dateStr = now.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit' });
            const timeStr = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            clockEl.textContent = `${dateStr} ${timeStr}`;
        }
    }

    function enterModule(module) {
        const view = document.getElementById('current-view');
        document.getElementById('btn-back-portal').style.display = 'flex';
        
        if (module === 'valet') {
            renderHome(view);
        } else if (module === 'hr') {
            showTab('staff');
        }
    }

    function exitToPortal() {
        // Ocultar todo y volver al portal
        const views = ['home-view', 'admin-view', 'staff-view', 'checkin-view', 'resumen-view', 'eventos-view'];
        views.forEach(v => {
            const el = document.getElementById(v);
            if (el) el.style.display = 'none';
        });
        document.getElementById('portal-view').style.display = 'block';
        document.getElementById('btn-back-portal').style.display = 'none';
    }

    // --- SCREEN SAVER LOGIC ---
    let idleTime = 0;
    let currentPattern = [];
    let isDrawing = false;
    const SAVED_PATTERN = "012"; // Default pattern, could be fetched from API

    function initScreenSaver() {
        document.onmousemove = document.onkeypress = document.ontouchstart = () => idleTime = 0;
        setInterval(() => {
            idleTime++;
            if (idleTime >= 300) { // 5 minutes inactivity
                document.getElementById('screensaver').style.display = 'flex';
            }
        }, 1000);
    }

    function hideScreenSaver() {
        document.getElementById('screensaver').style.display = 'none';
        idleTime = 0;
    }

    async function checkActiveSession() {
        const res = await apiFetch('/api/sessions/active');
        const session = (res && res.sessions && res.sessions.length > 0) ? res.sessions[0] : null;
        const display = document.getElementById('active-session-display');
        const banner = document.getElementById('no-session-banner');
        
        if (session) {
            window.activeSession = session;
            if (display) {
                display.textContent = session.name;
                display.style.display = 'block';
            }
            if (banner) banner.style.display = 'none';
            if (document.getElementById('menu-checkin')) {
                document.getElementById('menu-checkin').classList.remove('disabled');
                document.getElementById('menu-eventos').classList.remove('disabled');
            }
        } else {
            window.activeSession = null;
            display.style.display = 'none';
            if (banner) banner.style.display = 'block';
            if (document.getElementById('menu-checkin')) {
                document.getElementById('menu-checkin').classList.add('disabled');
                document.getElementById('menu-eventos').classList.add('disabled');
            }
        }
    }

    // NAVIGATION
    async function showTab(tab) {
        const view = document.getElementById('current-view');
        
        if (tab === 'home' || tab === 'valet-menu') {
            renderHome(view);
            return;
        }

        // Bloqueo de seguridad: No permitir Recepción si no hay evento activo
        if (tab === 'checkin' && !window.activeSession) {
            toast('⚠️ DEBE INICIAR UN EVENTO EN ADMIN PARA REGISTRAR VEHÍCULOS', 'warning');
            return;
        }

        // Renderizar la vista correspondiente
        switch(tab) {
            case 'checkin': renderCheckin(view); break;
            case 'eventos': renderEvents(view); break;
            case 'checkout': renderCheckout(view); break;
            case 'resumen': renderResumen(view); break;
            case 'admin': renderAdmin(view); break;
            case 'staff': renderStaff(view); break;
        }
    }

    function renderHome(el) {
        document.getElementById('btn-back-portal').style.display = 'flex';
        el.innerHTML = `
            <div id="home-view">
                <div class="view-header" style="justify-content: center; text-align: center;">
                    <h1 class="view-title">MENÚ VALET PARKING</h1>
                </div>
                
                <div class="menu-grid" style="grid-template-columns: repeat(3, 1fr); max-width: 1000px; margin: 20px auto;">
                    <div id="menu-checkin" class="menu-item ${!window.activeSession ? 'disabled' : ''}" onclick="showTab('checkin')">
                        <i>🚗</i>
                        <div class="menu-item-content">
                            <span class="menu-item-title">RECEPCIÓN</span>
                            <span class="menu-item-desc">INGRESAR VEHÍCULO</span>
                        </div>
                    </div>
                    
                    <div id="menu-eventos" class="menu-item ${!window.activeSession ? 'disabled' : ''}" onclick="showTab('eventos')">
                        <i>📊</i>
                        <div class="menu-item-content">
                            <span class="menu-item-title">CUSTODIA</span>
                            <span class="menu-item-desc">VEHÍCULOS EN RECINTO</span>
                        </div>
                    </div>

                    <div class="menu-item" onclick="showTab('resumen')">
                        <i>📋</i>
                        <div class="menu-item-content">
                            <span class="menu-item-title">RESUMEN</span>
                            <span class="menu-item-desc">REPORTE Y CIERRE</span>
                        </div>
                    </div>
                </div>

                <div class="footer-info" style="margin-top:40px; text-align:center; color:var(--muted)">
                    EYE STAFF © 2026 — OPERACIONES
                </div>
            </div>
        `;
    }

    async function renderEvents(el) {
        el.innerHTML = `
            <div class="view-header"><h1 class="view-title">📊 CUSTODIA</h1></div>
            <div id="custodia-hero" style="margin-bottom:25px"></div>
            
            <div class="stat-card" style="margin-bottom:20px">
                <div class="field">
                    <label>BUSCADOR DE PLACA</label>
                    <input type="text" id="custodia-search" placeholder="BUSCAR VEHÍCULO..." oninput="filterCustodia(this.value)" style="text-transform:uppercase; font-size:1.2rem; text-align:center; height:50px;">
                </div>
            </div>

            <div id="custodia-list-detail"></div>
            <div class="back-nav" onclick="showTab('home')" style="margin-top:20px">← VOLVER AL MENU</div>
            <div class="chat-access-btn" onclick="showGlobalChat()">💬 CONTÁCTANOS</div>
            <div class="footer-info">COPYRIGHT EYE STAFF 2026</div>
        `;
        loadCustodiaOnly();
    }

    let fullCustodiaList = [];
    async function loadCustodiaOnly() {
        if (!window.activeSession) return;
        // Cargar stats
        const stats = await apiFetch('/api/events/stats?session_id=' + window.activeSession.id);
        const hero = document.getElementById('custodia-hero');
        if (stats && hero) {
            hero.innerHTML = `
                <div class="stat-card" style="text-align:center; border-bottom:5px solid var(--success); padding:30px;">
                    <div style="font-size:1rem; color:var(--muted); font-weight:700;">VEHÍCULOS EN RECINTO</div>
                    <div style="font-size:4rem; font-weight:900; color:var(--success)">${stats.custody || stats.in_custody || 0}</div>
                </div>
            `;
        }

        const res = await apiFetch('/api/events/detail/CUSTODIA?session_id=' + window.activeSession.id);
        if (res && res.list) {
            fullCustodiaList = res.list;
            renderCustodiaList(fullCustodiaList);
        }
    }

    function filterCustodia(q) {
        const filtered = fullCustodiaList.filter(v => v.plate.includes(q.toUpperCase()));
        renderCustodiaList(filtered);
    }

    function renderCustodiaList(list) {
        const container = document.getElementById('custodia-list-detail');
        if (!container) return;

        // Prioridad: los solicitados arriba
        const sorted = [...list].sort((a, b) => {
            const aReq = a.status === 'pending_retrieval';
            const bReq = b.status === 'pending_retrieval';
            if (aReq && !bReq) return -1;
            if (!aReq && bReq) return 1;
            return 0;
        });

        container.innerHTML = sorted.map(v => `
            <div class="vehicle-card" onclick="viewVehicleDetail(${v.id})" style="border-left:4px solid ${v.status === 'pending_retrieval' ? 'var(--danger)' : 'var(--success)'}; margin-bottom:10px; cursor:pointer; position:relative; overflow:hidden;">
                ${v.status === 'pending_retrieval' ? `
                    <div style="position:absolute; top:0; right:0; background:var(--danger); color:white; font-size:0.6rem; font-weight:900; padding:4px 10px; border-bottom-left-radius:10px; animation: pulse 1s infinite;">SOLICITADA ENTREGA</div>
                ` : ''}
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div class="plate-tag">${v.plate}</div>
                    <div style="font-size:0.75rem; color:var(--muted)">ENTRADA: ${v.time.split(' ')[1]}</div>
                </div>
                <div style="margin-top:10px; font-weight:700; font-size:1rem;">${v.owner_name || 'SIN NOMBRE'}</div>
                <div style="font-size:0.8rem; color:var(--muted)">${v.brand || ''} ${v.model || ''}</div>
            </div>
        `).join('') || '<p style="text-align:center; color:var(--muted)">NO SE ENCONTRARON VEHÍCULOS</p>';
    }

    async function viewStatsDetail(type) {
        const container = document.getElementById('stats-detail-list');
        showLoading('CARGANDO DETALLE...');
        const res = await apiFetch('/api/events/detail/' + type);
        hideLoading();
        if (!res) return;

        container.innerHTML = `
            <div class="card" style="border:1px solid var(--accent)">
                <h3 style="margin-top:0">DETALLE: ${type}</h3>
                <div style="overflow-x:auto">
                    <table class="table" style="font-size:0.85rem;">
                        <thead>
                            <tr><th>PLACA</th><th>NOMBRE</th><th>HORA</th></tr>
                        </thead>
                        <tbody>
                            ${res.list.map(v => `
                                <tr onclick="viewVehicleDetail(${v.id})" style="cursor:pointer">
                                    <td><b>${v.plate}</b></td>
                                    <td>${v.owner_name || '—'}</td>
                                    <td>${v.time || '—'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        container.scrollIntoView({ behavior: 'smooth' });
    }

    async function updateEventStats() {
        const session = await apiFetch('/api/sessions/active');
        const nameEl = document.getElementById('active-session-name');
        
        if (session && !session.error) {
            nameEl.textContent = session.name;
            const stats = await apiFetch('/api/sessions/active/stats');
            if (stats) {
                document.getElementById('val-reservations').textContent = stats.reservations || 0;
                document.getElementById('val-recibidos').textContent = stats.recibidos || 0;
                document.getElementById('val-custodia').textContent = stats.custodia || 0;
                document.getElementById('val-entregados').textContent = stats.entregados || 0;
            }
        } else {
            nameEl.textContent = 'SIN EVENTO ACTIVO';
        }
    }

    async function updateEventSessionUI() {
        const container = document.getElementById('event-session-status');
        const session = await apiFetch('/api/sessions/active');
        if (session && !session.error) {
            container.innerHTML = `
                <div style="color:var(--success); font-weight:800; font-size:1.2rem; margin-bottom:10px">● ACTIVA</div>
                <div style="font-size:1.1rem">${session.name}</div>
                <div style="color:var(--muted); font-size:0.8rem; margin-top:5px">Iniciada: ${new Date(session.created_at || Date.now()).toLocaleString()}</div>
            `;
        } else {
            container.innerHTML = `<div style="color:var(--muted)">No hay una sesión de trabajo activa.</div>`;
        }
    }

    async function startNewSession() {
        const name = prompt('Nombre del evento o jornada (ej: Boda Familia Perez):');
        if (!name) return;
        showLoading('Iniciando sesión...');
        try {
            const res = await apiFetch('/api/sessions/plan', { method: 'POST', body: JSON.stringify({ name }) });
            if (res) {
                await apiFetch('/api/sessions/activate', { method: 'POST', body: JSON.stringify({ id: res.id }) });
                // ENVIAR REPORTE DE INICIO (No bloquea si falla)
                apiFetch('/api/reports/send-start', { method: 'POST', body: JSON.stringify({ id: res.id }) }).catch(e => console.error('Error enviando reporte inicio:', e));
                
                toast('Sesión iniciada', 'success');
                await checkActiveSession();
                showTab('home');
            }
        } catch (e) {
            toast('Error al iniciar sesión: ' + e.message, 'danger');
        } finally {
            hideLoading();
        }
    }

    async function renderCheckin(el) {
        currentDamageMarks = [];
        photoData = {};
        el.innerHTML = `
            <div class="view-header"><h1 class="view-title">🚗 RECEPCIÓN</h1></div>
            
            <div class="grid" style="display: flex; justify-content: center;">
                <div class="stat-card" style="width: 100%; max-width: 500px; margin: 0 auto;">
                    <div class="field"><label>PLACA DEL VEHÍCULO <span style="color:var(--brand-red)">*</span></label><input type="text" id="in-plate" placeholder="EJ: ABC-123" oninput="handlePlateInput(this.value)" list="predictive-plates" required></div>
                    <datalist id="predictive-plates"></datalist>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <div class="field"><label>MARCA <span style="color:var(--brand-red)">*</span></label><input type="text" id="in-brand" placeholder="EJ: TOYOTA" required></div>
                        <div class="field"><label>MODELO <span style="color:var(--brand-red)">*</span></label><input type="text" id="in-model" placeholder="EJ: COROLLA" required></div>
                    </div>
                    
                    <div class="field"><label>COLOR <span style="color:var(--brand-red)">*</span></label><input type="text" id="in-color" placeholder="EJ: BLANCO" required></div>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <div class="field"><label>NOMBRE <span style="color:var(--brand-red)">*</span></label><input type="text" id="in-owner" placeholder="EJ: JUAN PEREZ" required></div>
                        <div class="field"><label>CONTACTO <span style="color:var(--brand-red)">*</span></label><input type="text" id="in-phone" placeholder="EJ: +584141234567" required></div>
                    </div>
                    <div class="field"><label>EMAIL <span style="color:var(--brand-red)">*</span></label><input type="email" id="in-email" placeholder="EJ: CLIENTE@CORREO.COM" required></div>

                    <div class="detail-section-title" style="margin-top:20px">INSPECCIÓN DE ENTRADA</div>
                    <div style="border-bottom: 1px solid var(--border); margin: 10px 0 20px 0; opacity: 0.3;"></div>
                    <div class="damage-canvas" onclick="markDamage(event)" style="max-width:320px; background:white; padding:0; border-radius:15px; position:relative; overflow:hidden; border:1px solid var(--border);">
                        <img src="car-blueprint.png" style="width:100%; display:block; pointer-events:none;">
                        <svg viewBox="0 0 1000 1000" id="damage-svg" style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none;">
                            <g id="damage-marks"></g>
                        </svg>
                    </div>
                    <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
                    <button class="btn btn-sm btn-secondary" onclick="clearDamage()" style="width:100%; margin-bottom:20px;">🧹 LIMPIAR MARCAS</button>
                    <textarea id="in-notes" placeholder="NOTAS ADICIONALES SOBRE EL ESTADO..." style="height:80px; margin-bottom:20px;"></textarea>

                    <div class="detail-section-title">EVIDENCIA FOTOGRÁFICA</div>
                    <div class="photo-grid">
                        <div class="photo-slot" onclick="triggerPhoto(0)" id="slot-0"><i>📷</i><span class="photo-label">FRONTAL</span></div>
                        <div class="photo-slot" onclick="triggerPhoto(1)" id="slot-1"><i>📷</i><span class="photo-label">TRASERA</span></div>
                        <div class="photo-slot" onclick="triggerPhoto(2)" id="slot-2"><i>📷</i><span class="photo-label">PILOTO</span></div>
                        <div class="photo-slot" onclick="triggerPhoto(3)" id="slot-3"><i>📷</i><span class="photo-label">COPILOTO</span></div>
                    </div>
                    <input type="file" id="photo-input" accept="image/*,image/heic,image/heif,image/webp" capture="environment" style="display:none" onchange="handlePhoto(this)">
                    
                    <button class="btn" style="width:100%; margin-top:30px; height:70px; font-size:1.4rem" onclick="processCheckin()">GENERAR TICKET</button>
                </div>
            </div>
            <div class="back-nav" onclick="showTab('home')" style="margin-top:20px">← VOLVER AL MENU</div>
            <div class="chat-access-btn" onclick="showGlobalChat()">💬 CONTÁCTANOS</div>
            <div class="footer-info">COPYRIGHT EYE STAFF 2026</div>
        `;
    }

    let currentDamageMarks = [];
    let photoData = {};
    let activePhotoSlot = null;

    function markDamage(e) {
        const svg = document.getElementById('damage-svg');
        const rect = svg.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 1000;
        const y = ((e.clientY - rect.top) / rect.height) * 1000;
        currentDamageMarks.push({x, y});
        renderDamageMarks();
    }

    function renderDamageMarks() {
        const g = document.getElementById('damage-marks');
        g.innerHTML = currentDamageMarks.map(m => `<circle cx="${m.x}" cy="${m.y}" r="20" fill="var(--brand-red)" stroke="white" stroke-width="4"/>`).join('');
    }

    function clearDamage() { currentDamageMarks = []; renderDamageMarks(); }

    async function triggerAIScan() {
        document.getElementById('ai-photo-input').click();
    }

    async function handleAIScan(input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        
        showLoading('🤖 IA Analizando vehículo...');
        
        try {
            // Comprimimos MUCHO más para la IA (800px es suficiente para OCR)
            const base64 = await compressImage(file, 800, 0.6);
            
            const res = await apiFetch('/api/ai/scan-vehicle', {
                method: 'POST',
                body: JSON.stringify({ image: base64 })
            });
            
            if (res) {
                if (res.plate) document.getElementById('in-plate').value = res.plate.toUpperCase();
                if (res.brand) document.getElementById('in-brand').value = `${res.brand} ${res.model || ''}`.trim();
                if (res.color) {
                    // El color lo guardamos en notas o concatenamos
                    document.getElementById('in-brand').value += ` (Color: ${res.color})`;
                }
                
                // Además, guardamos esta foto como la primera de evidencia (0 = FRONTAL)
                photoData[0] = base64;
                const slot = document.getElementById('slot-0');
                if (slot) {
                    slot.classList.add('filled');
                    slot.innerHTML = `<img src="${base64}">`;
                }
                
                toast('✅ Datos reconocidos por IA', 'success');
            }
        } catch (e) {
            toast('Error en escaneo IA', 'error');
        } finally {
            hideLoading();
        }
    }

    async function triggerPhoto(idx) {
        activePhotoSlot = idx;
        document.getElementById('photo-input').click();
    }

    async function handlePhoto(input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        
        showLoading('Optimizando imagen...');
        
        try {
            const base64 = await compressImage(file);
            photoData[activePhotoSlot] = base64;
            const slot = document.getElementById('slot-' + activePhotoSlot);
            slot.classList.add('filled');
            slot.innerHTML = `<img src="${base64}">`;
            toast('📸 Foto optimizada', 'success');
        } catch (e) {
            toast('Error al procesar foto', 'error');
        } finally {
            hideLoading();

    function compressImage(file, maxWidth = 1200, quality = 0.7) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = maxWidth;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
            };
        });
    }

    function openPhotoViewer(urls, startIdx = 0) {
        let currentIdx = startIdx;
        const modal = document.getElementById('modal-container');

        const updateView = () => {
            body.innerHTML = `
                <div class="photo-modal-content">
                    <button class="photo-close-btn" onclick="closeModal()">Cerrar</button>
                    <div class="photo-viewer-container">
                        <img src="${API_BASE}/api/photos/${urls[currentIdx]}" class="photo-viewer-img">
                        ${urls.length > 1 ? `
                            <div class="photo-viewer-nav">
                                <button class="photo-nav-btn" id="prev-photo"><i>◀</i></button>
                                <button class="photo-nav-btn" id="next-photo"><i>▶</i></button>
                            </div>
                        ` : ''}
                    </div>
                    <div style="text-align:center; margin-top:20px; color:var(--muted); font-size:0.9rem">
                        Foto ${currentIdx + 1} de ${urls.length}
                    </div>
                </div>
            `;
            
            if (urls.length > 1) {
                document.getElementById('prev-photo').onclick = (e) => { e.stopPropagation(); currentIdx = (currentIdx - 1 + urls.length) % urls.length; updateView(); };
                document.getElementById('next-photo').onclick = (e) => { e.stopPropagation(); currentIdx = (currentIdx + 1) % urls.length; updateView(); };
            }
        };

        updateView();
        modal.classList.add('open');
        modal.onclick = (e) => { if (e.target === modal) closeModal(); };
    }

    async function apiFetch(path, options = {}) {
        const token = localStorage.getItem('token');
        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...options.headers };
        try {
            const res = await fetch(API_BASE + path, { ...options, headers });
            const data = await res.json();
            if (!res.ok) {
                toast(data.error || 'Error en la solicitud', 'error');
                return null;
            }
            return data;
        } catch (e) {
            console.error('API Fetch Error:', e);
            toast('Error de conexión con el servidor', 'error');
            return null;
        }
    }

        reader.onload = async (e) => {

            showLoading('PROCESANDO LISTA...');
            const res = await apiFetch('/api/admin/preload-csv', {

                <div class="grid" style="gap:10px;">
                    <div class="field"><label>NOMBRE COMPLETO</label><input type="text" id="staff-name" placeholder="Ej: Juan Pérez"></div>
                    <div class="field"><label>ROL</label>
                        <select id="staff-role" style="width:100%; height:45px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:white; padding:0 10px;">
                            <option value="driver">Valet / Operador</option>
                            <option value="supervisor">Supervisor</option>
                            <option value="director">Director</option>
                        </select>
                    </div>
                    <div class="field"><label>PIN DE ACCESO (4 DÍGITOS)</label><input type="password" id="staff-pin" maxlength="4" placeholder="Ej: 1234"></div>
                    <button class="btn btn-accent" onclick="saveNewStaff()" style="height:50px; font-weight:800; margin-top:10px;">GUARDAR EMPLEADO</button>
                </div>
            </div>

            <!-- IMPORTAR CSV -->
            <div class="card" style="margin-bottom:30px">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0">IMPORTACIÓN / ACTUALIZACIÓN RRHH</h3>
                    <button class="btn btn-sm btn-accent" onclick="downloadRRHHTemplate()" style="font-size:0.7rem;">📥 DESCARGAR PLANTILLA RRHH</button>
                </div>
                <p style="font-size:0.75rem; color:var(--muted); margin-bottom:10px;">FORMATO CSV REQUERIDO (11 COLUMNAS):</p>
                <div style="font-size:0.65rem; color:var(--accent2); background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; margin-bottom:15px; line-height:1.4;">
                    1.Item | 2.Código(PIN) | 3.Status | 4.Cargo | 5.Nombre | 6.Cédula | 7.Sector | 8.Teléfono | 9.Familiar | 10.Tel.Familiar | 11.Alergias
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="file" id="staff-csv-file" accept=".csv" style="flex:1; padding:10px; background:var(--surface2); border-radius:8px; font-size:0.8rem;">
                    <button class="btn btn-secondary" onclick="importStaffCSV()" style="padding:0 20px; font-weight:800;">IMPORTAR</button>
                </div>
            </div>

            <!-- LISTA DE STAFF -->
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0">LISTA DE PERSONAL ACTIVO</h3>
                    <button class="btn btn-sm btn-secondary" onclick="downloadStaffCSV()" style="font-size:0.7rem;">📥 DESCARGAR LISTA (CSV)</button>
                </div>
                <div id="staff-list-container" class="grid" style="grid-template-columns: 1fr; gap:10px;">
                    <div style="text-align:center; padding:20px;">Cargando personal...</div>
                </div>
            </div>
        `;
        loadStaffList();
    }

    async function loadStaffList() {
        const res = await apiFetch('/api/staff');
        const container = document.getElementById('staff-list-container');
        if (res && res.staff) {
            if (res.staff.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:var(--muted);">Sin personal registrado</div>';
                return;
            }
            container.innerHTML = res.staff.map(u => `
                <div class="stat-card" style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:var(--surface2);">
                    <div>
                        <div style="font-weight:800; font-size:1.1rem;">${u.name}</div>
                        <div style="font-size:0.75rem; color:var(--accent2); text-transform:uppercase; font-weight:900; letter-spacing:1px;">${u.role}</div>
                    </div>
                    <button class="btn btn-sm btn-danger" onclick="deleteStaff(${u.id})" style="padding:5px 15px; font-size:0.7rem;">ELIMINAR</button>
                </div>
            `).join('');
        }
    }

    async function saveNewStaff() {
        const name = document.getElementById('staff-name').value.trim();
        const role = document.getElementById('staff-role').value;
        const pin = document.getElementById('staff-pin').value.trim();
        
        if (!name || !pin) return toast('Nombre y PIN son obligatorios', 'warning');
        
        showLoading('REGISTRANDO...');
        const res = await apiFetch('/api/staff', {
            method: 'POST',
            body: JSON.stringify({ name, role, pin })
        });
        hideLoading();
        
        if (res) {
            toast('Empleado registrado', 'success');
            document.getElementById('staff-name').value = '';
            document.getElementById('staff-pin').value = '';
            loadStaffList();
        }
    }

    async function deleteStaff(id) {
        if (!confirm('¿ESTÁ SEGURO DE ELIMINAR A ESTE EMPLEADO?')) return;
        const res = await apiFetch('/api/staff/' + id, { method: 'DELETE' });
        if (res) {
            toast('Empleado eliminado', 'success');
            loadStaffList();
        }
    }

    async function importStaffCSV() {
        const fileInput = document.getElementById('staff-csv-file');
        if (!fileInput.files.length) return toast('Seleccione un archivo CSV', 'warning');
        
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const text = e.target.result;
            showLoading('IMPORTANDO PERSONAL...');
            const res = await apiFetch('/api/staff/import', {
                method: 'POST',
                body: JSON.stringify({ csv: text })
            });
            hideLoading();
            if (res && res.success) {
                toast('IMPORTACIÓN EXITOSA: ' + res.count + ' EMPLEADOS', 'success');
                loadStaffList();
            }
        };
        reader.readAsText(file);
    }

    async function downloadStaffCSV() {
        const res = await apiFetch('/api/staff');
        if (res && res.staff) {
            const csvRows = [
                ['ID', 'NOMBRE', 'ROL', 'FECHA REGISTRO'].join(','),
                ...res.staff.map(u => [u.id, `"${u.name}"`, u.role, u.created_at].join(','))
            ];
            const csvString = csvRows.join('\n');
            const blob = new Blob([csvString], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'staff_eye_staff.csv');
            a.click();
        }
    }
    async function downloadRRHHTemplate() {
        const res = await apiFetch('/api/staff');
        if (res && res.staff) {
            const csvRows = [
                ['Item', 'Codigo(PIN)', 'Status', 'Cargo', 'Nombre', 'Cedula', 'Sector', 'Telefono', 'Familiar', 'TelFamiliar', 'Alergias'].join(','),
                ...res.staff.map((u, i) => [
                    i + 1, 
                    u.pin_hash || '1234', 
                    'ACTIVO', 
                    u.role.toUpperCase(), 
                    `"${u.name}"`, 
                    u.cedula || '', 
                    `"${u.sector || ''}"`, 
                    u.phone || '', 
                    `"${u.emergency_contact || ''}"`, 
                    u.emergency_phone || '', 
                    u.is_allergic || ''
                ].join(','))
            ];
            const csvString = csvRows.join('\n');
            const blob = new Blob([csvString], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'PLANTILLA_RRHH_EYE_STAFF.csv');
            a.click();
        }
    }
</script>

</body>
